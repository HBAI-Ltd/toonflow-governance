<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toonflow理事会（首次会议） - 聊天记录</title>
    <style>:root {
  color-scheme: light;
  --bg: #f6f7fb;
  --card: #ffffff;
  --text: #1f2a37;
  --muted: #6b7280;
  --accent: #4f46e5;
  --sent: #dbeafe;
  --received: #ffffff;
  --border: #e5e7eb;
  --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
  --radius: 16px;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.page {
  max-width: 1080px;
  margin: 0 auto;
  padding: 8px 20px;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.header {
  background: var(--card);
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
  padding: 12px 20px;
  flex-shrink: 0;
}

.title {
  font-size: 16px;
  font-weight: 600;
  margin: 0;
  display: inline;
}

.meta {
  color: var(--muted);
  font-size: 13px;
  display: inline;
  margin-left: 12px;
}

.meta span {
  margin-right: 10px;
}

.controls {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
  flex-wrap: wrap;
}

.controls input,
.controls button {
  border-radius: 8px;
  border: 1px solid var(--border);
  padding: 6px 10px;
  font-size: 13px;
  font-family: inherit;
}

.controls input[type="search"] {
  width: 200px;
}

.controls input[type="datetime-local"] {
  width: 200px;
}

.controls button {
  background: var(--accent);
  color: #fff;
  border: none;
  cursor: pointer;
  padding: 6px 14px;
}

.controls button:active {
  transform: scale(0.98);
}

.stats {
  font-size: 13px;
  color: var(--muted);
  margin-left: auto;
}

.message-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 4px 0;
}

.message {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.message.hidden {
  display: none;
}

.message-time {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 6px;
}

.message-row {
  display: flex;
  gap: 12px;
  align-items: flex-end;
}

.message.sent .message-row {
  flex-direction: row-reverse;
}

.avatar {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: #eef2ff;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  flex-shrink: 0;
  color: #475569;
  font-weight: 600;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.bubble {
  max-width: min(70%, 720px);
  background: var(--received);
  border-radius: 18px;
  padding: 12px 14px;
  border: 1px solid var(--border);
  box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
}

.message.sent .bubble {
  background: var(--sent);
  border-color: transparent;
}

.sender-name {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 6px;
}

.message-content {
  display: flex;
  flex-direction: column;
  gap: 8px;
  font-size: 14px;
  line-height: 1.6;
}

.message-text {
  word-break: break-word;
}

.quoted-message {
  border-left: 3px solid rgba(79, 70, 229, 0.35);
  background: rgba(79, 70, 229, 0.06);
  border-radius: 12px;
  padding: 8px 10px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.message.sent .quoted-message {
  background: rgba(37, 99, 235, 0.08);
  border-left-color: rgba(37, 99, 235, 0.35);
}

.quoted-sender {
  font-size: 12px;
  color: #374151;
  font-weight: 600;
}

.quoted-text {
  font-size: 13px;
  color: #4b5563;
  word-break: break-word;
}

.message-link-card {
  color: #2563eb;
  text-decoration: underline;
  text-underline-offset: 2px;
  word-break: break-all;
}

.message-link-card:hover {
  color: #1d4ed8;
}

.inline-emoji {
  width: 22px;
  height: 22px;
  vertical-align: text-bottom;
  margin: 0 2px;
}

.message-media {
  border-radius: 14px;
  max-width: 100%;
}

.previewable {
  cursor: zoom-in;
}

.message-media.image,
.message-media.emoji {
  max-height: 260px;
  object-fit: contain;
  background: #f1f5f9;
  padding: 6px;
}

.message-media.emoji {
  max-height: 160px;
  width: auto;
}

.message-media.video {
  max-height: 360px;
  background: #111827;
}

.message-media.audio {
  width: 260px;
}

.image-preview {
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
  z-index: 999;
}

.image-preview.active {
  opacity: 1;
  pointer-events: auto;
}

.image-preview img {
  max-width: min(90vw, 1200px);
  max-height: 90vh;
  border-radius: 18px;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
  background: #0f172a;
  transition: transform 0.1s ease;
  cursor: zoom-out;
}

.highlight {
  outline: 2px solid var(--accent);
  outline-offset: 4px;
  border-radius: 18px;
  transition: outline-color 0.3s;
}

.empty {
  text-align: center;
  color: var(--muted);
  padding: 40px;
}

/* Scroll Container */
.scroll-container {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
  margin-top: 8px;
  margin-bottom: 8px;
  padding: 12px;
  -webkit-overflow-scrolling: touch;
}

.scroll-container::-webkit-scrollbar {
  width: 6px;
}

.scroll-container::-webkit-scrollbar-thumb {
  background: #c1c1c1;
  border-radius: 3px;
}

.load-sentinel {
  height: 1px;
}
</style>

{"i":33,"t":1774328979,"s":1,"a":"<img src=\"avatars/wxid_1b5ygjninewb12.jpg\" alt=\"jason\" />","b":"<div class=\"message-time\">2026-03-24 13:09:39</div><div class=\"sender-name\">jason</div><div class=\"message-content\"><div class=\"message-text\">[群公告]Toonflow 社区理事会 · 第一次会议预告<br /><br />各位好，我们计划近期召开 Toonflow 社区理事会第一次会议，以下是本次议程预告：<br />三项决议将进行讨论与审阅：<br />① 开源协议变更<br />从 AGPL-3.0 变更为 Apache 2.0 + 补充协议<br />规则更透明，内容创作永久免费，商业 SaaS 使用按规模授权<br />② 授权定价体系<br />五档梯度定价，年销售额 10 万以下免费登记，10 万起按规模收取授权费<br />在你还没赚到钱之前，我们不收你的钱<br />③ 授权收入 50% 回归社区基金（前期由HBAI进行管理，理事会满15席后由理事会决议讨论第三方进行监管）<br />HBAI 承诺全部授权收入的 50% 直接用于社区建设与贡献者分红<br />季度公示，从第一笔起执行<br /><br />社区治理架构同步公布：<br />理事会构成（15席）<br />社区贡献者席 11 席 — 由贡献积分选举产生，任期 1 年<br />HBAI 任命席 4 席 — 保留最终否决权<br />治理权与经济权分离<br />理事会席位不附带分红资格<br />分红面向所有贡献者，年度积分 ≥ 50 分即可参与，按积分比例分配<br />贡献积分体系<br />PR 合并 / Issue 贡献 / Skill 发布 / 文档教程 / 社区活跃均可积累积分<br />积分决定分红比例，也决定理事会参选资格<br />社区见证人制度<br />我们将从开发者社区招募 3-5 名社区见证人<br />旁听理事会全程、可提交书面意见，代表社区声音在场<br /><br />完整决议文件、社区宣言、治理章程将在会议前发出。<br />欢迎提前提问，我们会在会议中统一讨论。<br />📅 会议时间2026年3月24日下午四点，为微信内文字进行沟通。</div></div>","p":"4638175719585718418"},

{"i":71,"t":1774341080,"s":1,"a":"<img src=\"avatars/wxid_1b5ygjninewb12.jpg\" alt=\"jason\" />","b":"<div class=\"message-time\">2026-03-24 16:31:20</div><div class=\"sender-name\">jason</div><div class=\"message-content\"><div class=\"message-text\">### 决议三：授权收入 50% 回归社区基金<br /><br />**内容：** HBAI-Ltd 承诺，全部商业授权收入的 **50%** 直接用于社区建设与社区基金<br /><br />**背景：** HBAI-Ltd 拥有多条独立收入线（API 站、SkillsHub、AIGC 教育平台、SaaS 商业版），Toonflow 社区版授权非公司主要收入，具备持续履约能力。<br /><br />**社区基金用途（参考比例，由理事会投票决定）：**<br /><br />| 用途 | 参考比例 |<br />|------|---------|<br />| 贡献者年度分红 | ~40% |<br />| 社区基础设施（服务器、工具、活动） | ~30% |<br />| 社区资助项目（功能开发、文档、教程） | ~20% |<br />| 年度开发者峰会 | ~10% |<br /><br />**透明机制：**<br />- 每季度公布授权收入总额 + 基金划拨金额<br />- 每半年公示基金使用明细<br />- 社区理事会对基金用途优先级进行投票<br /><br />---</div></div>","p":"5393668957840860339"},

    <script>
       
      class ChunkedRenderer {
        constructor(container, data, renderItem) {
          this.container = container;
          this.data = data;
          this.renderItem = renderItem;
          this.batchSize = 100;
          this.rendered = 0;
          this.loading = false;

          this.list = document.createElement('div');
          this.list.className = 'message-list';
          this.container.appendChild(this.list);

          this.sentinel = document.createElement('div');
          this.sentinel.className = 'load-sentinel';
          this.container.appendChild(this.sentinel);

          this.renderBatch();

          this.observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && !this.loading) {
              this.renderBatch();
            }
          }, { root: this.container, rootMargin: '600px' });
          this.observer.observe(this.sentinel);
        }

        renderBatch() {
          if (this.rendered >= this.data.length) return;
          this.loading = true;
          const end = Math.min(this.rendered + this.batchSize, this.data.length);
          const fragment = document.createDocumentFragment();
          for (let i = this.rendered; i < end; i++) {
            const wrapper = document.createElement('div');
            wrapper.innerHTML = this.renderItem(this.data[i], i);
            if (wrapper.firstElementChild) fragment.appendChild(wrapper.firstElementChild);
          }
          this.list.appendChild(fragment);
          this.rendered = end;
          this.loading = false;
        }

        setData(newData) {
          this.data = newData;
          this.rendered = 0;
          this.list.innerHTML = '';
          this.container.scrollTop = 0;
          if (this.data.length === 0) {
            this.list.innerHTML = '<div class="empty">暂无消息</div>';
            return;
          }
          this.renderBatch();
        }

        scrollToTime(timestamp) {
          const idx = this.data.findIndex(item => item.t >= timestamp);
          if (idx === -1) return;
          // Ensure all messages up to target are rendered
          while (this.rendered <= idx) {
            this.renderBatch();
          }
          const el = this.list.children[idx];
          if (el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            el.classList.add('highlight');
            setTimeout(() => el.classList.remove('highlight'), 2500);
          }
        }

        scrollToIndex(index) {
          while (this.rendered <= index) {
            this.renderBatch();
          }
          const el = this.list.children[index];
          if (el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }
      }

         const replyToAttr = item.r ? ` data-reply-to-message-id="${item.r}"` : '';
         return `
          <div class="message ${isSenderMe ? 'sent' : 'received'}" data-index="${item.i}"${platformIdAttr}${replyToAttr}>
            <div class="message-row">
              <div class="avatar">${item.a}</div>
              <div class="bubble">
                ${item.b}
              </div>
            </div>
          </div>
         `;
      };
      
      const renderer = new ChunkedRenderer(container, currentList, renderItem);

      const updateCount = () => {
        resultCount.textContent = `共 ${currentList.length} 条`
      }

      // Search Logic
      let searchTimeout;
      searchInput.addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
          const keyword = searchInput.value.trim().toLowerCase();
          if (!keyword) {
            currentList = allData;
          } else {
            currentList = allData.filter(item => {
               return item.b.toLowerCase().includes(keyword); 
            });
          }
          renderer.setData(currentList);
          updateCount();
        }, 300);
      })

      // Jump Logic
      jumpBtn.addEventListener('click', () => {
        const value = timeInput.value
        if (!value) return
        const target = Math.floor(new Date(value).getTime() / 1000)
        renderer.scrollToTime(target);
      })

      // Image Preview (Delegation)
      container.addEventListener('click', (e) => {
        const target = e.target;
        if (target.classList.contains('previewable')) {
           const full = target.getAttribute('data-full')
           if (!full) return
           imagePreviewTarget.src = full
           imageZoom = 1
           imagePreviewTarget.style.transform = 'scale(1)'
           imagePreview.classList.add('active')
        }
      });

      imagePreviewTarget.addEventListener('click', (event) => {
        event.stopPropagation()
      })

      imagePreviewTarget.addEventListener('dblclick', (event) => {
        event.stopPropagation()
        imageZoom = 1
        imagePreviewTarget.style.transform = 'scale(1)'
      })

      imagePreviewTarget.addEventListener('wheel', (event) => {
        event.preventDefault()
        const delta = event.deltaY > 0 ? -0.1 : 0.1
        imageZoom = Math.min(3, Math.max(0.5, imageZoom + delta))
        imagePreviewTarget.style.transform = `scale(${imageZoom})`
      }, { passive: false })

      imagePreview.addEventListener('click', () => {
        imagePreview.classList.remove('active')
        imagePreviewTarget.src = ''
        imageZoom = 1
        imagePreviewTarget.style.transform = 'scale(1)'
      })

      updateCount()
    </script>
  </body>
</html>
